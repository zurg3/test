<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PyCode</title>
    <link href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.min.css" rel="stylesheet" data-name="vs/editor/editor.main">
    <link href="pycode.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
  </head>
  <body>
    <p id="buttons_panel">
      <button onclick="run_code()">Run</button>
      <button onclick="clear_output()">Clear Output</button>
    </p>
    <div id="container">
      <div id="input" class="pane"></div>
      <div id="resizer"></div>
      <div id="output" class="pane">
        <textarea id="textarea" disabled></textarea>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/zurg3/my-stuff@master/html/monaco/require.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.min.js"></script>
    <script src="pycode.js"></script>
  </body>
</html>
